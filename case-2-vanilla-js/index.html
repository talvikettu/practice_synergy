<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Counter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="counter-app">
        <section class="counter-card">
            <p class="eyebrow">Case Task 2</p>
            <h1>Interactive Counter</h1>
            <div id="result" class="result result-zero" aria-live="polite">0</div>
            <div class="button-row">
                <button id="decrementBtn" type="button">Minus</button>
                <button id="incrementBtn" type="button">Plus</button>
            </div>
            <div id="message" class="message" aria-live="polite"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
